name: TQQQ Daily Sniper Bot

on:
  schedule:
    # 每天 UTC 12:00 執行 (台灣時間晚上 8:00，美股開盤前)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update CSV data
        id: update
        continue-on-error: true
        run: python update_data.py

      - name: Commit updated data
        if: steps.update.outcome == 'success'
        run: |
          git config user.name "TQQQ Sniper Bot"
          git config user.email "bot@github-actions"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "data: update OHLCV $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Execute Trading Strategy Bot
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          DATA_UPDATE_FAILED: ${{ steps.update.outcome == 'failure' && 'true' || '' }}
        run: python bot.py
